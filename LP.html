<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    /* Navbar */
    header {
      background: #111;
      color: #fff;
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      color: #00adb5;
    }

    /* Hero Section */
    .hero {
      height: 90vh;
      background: linear-gradient(to right, #00adb5, #0077b6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      background: #111;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #333;
    }

    /* Features */
    .features {
      padding: 60px 50px;
      display: flex;
      justify-content: space-around;
      text-align: center;
      flex-wrap: wrap;
    }

    .feature-box {
      width: 300px;
      margin: 20px;
    }

    .feature-box h3 {
      margin-bottom: 15px;
      color: #0077b6;
    }

    /* Footer */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* Responsive */
    @media(max-width: 768px) {
      .hero h2 {
        font-size: 32px;
      }

      .features {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <header>
    <h1>MyBrand</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h2>Build Your Future Today</h2>
      <p>Create amazing websites with simple HTML & CSS</p>
      <button class="btn">Get Started</button>
    </div>
  </section>

  <!-- Features -->
  <section class="features">
    <div class="feature-box">
      <h3>Fast</h3>
      <p>Optimized for performance and speed.</p>
    </div>
    <div class="feature-box">
      <h3>Responsive</h3>
      <p>Looks great on all devices.</p>
    </div>
    <div class="feature-box">
      <h3>Simple</h3>
      <p>Easy to understand and customize.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 MyBrand | All Rights Reserved</p>
  </footer>

</body>
</html>
