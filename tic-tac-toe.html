<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a2e;
        color: #eee;
        font-family: sans-serif;
        flex-direction: column;
        gap: 20px;
      }
      h1 {
        font-size: 1.5rem;
      }
      #status {
        font-size: 1.1rem;
        min-height: 1.4em;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 4px;
      }
      .cell {
        width: 100px;
        height: 100px;
        background: #16213e;
        border: none;
        color: #e94560;
        font-size: 2.5rem;
        cursor: pointer;
        border-radius: 6px;
      }
      .cell:hover {
        background: #1a2a4a;
      }
      button#reset {
        padding: 8px 24px;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Tic-Tac-Toe</h1>
    <div id="status">X's turn</div>
    <div class="board" id="board"></div>
    <button id="reset" onclick="init()">Reset</button>
    <script>
      const wins = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 2, 8],
        [2, 4, 6],
      ];
      let board, turn, over;
      function init() {
        board = Array(9).fill("");
        turn = "X";
        over = false;
        const b = document.getElementById("board");
        b.innerHTML = "";
        for (let i = 0; i < 9; i++) {
          const c = document.createElement("button");
          c.className = "cell";
          c.onclick = () => play(i, c);
          b.appendChild(c);
        }
        document.getElementById("status").textContent = "X's turn";
      }
      function play(i, c) {
        if (board[i] || over) return;
        board[i] = turn;
        c.textContent = turn;
        if (wins.some((w) => w.every((j) => board[j] === turn))) {
          document.getElementById("status").textContent = turn + " wins!";
          over = true;
        } else if (board.every((v) => v)) {
          document.getElementById("status").textContent = "Draw!";
          over = true;
        } else {
          turn = turn === "X" ? "O" : "X";
          document.getElementById("status").textContent = turn + "'s turn";
        }
      }
      init();
    </script>
  </body>
</html>
